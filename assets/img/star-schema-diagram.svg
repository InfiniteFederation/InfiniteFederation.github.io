<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Star schema diagram</title>
  <desc id="desc">A fact table in the middle connected to customer, product, date, geography, and channel dimensions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6eb"/>
      <stop offset="100%" stop-color="#fde7d2"/>
    </linearGradient>
    <linearGradient id="fact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d96c2a"/>
      <stop offset="100%" stop-color="#b7472e"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#fff4e7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#b77043" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <g stroke="#d6a178" stroke-width="4" stroke-linecap="round">
    <line x1="600" y1="350" x2="250" y2="170"/>
    <line x1="600" y1="350" x2="950" y2="170"/>
    <line x1="600" y1="350" x2="250" y2="530"/>
    <line x1="600" y1="350" x2="950" y2="530"/>
    <line x1="600" y1="350" x2="600" y2="90"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="445" y="255" width="310" height="190" rx="22" fill="url(#fact)"/>
    <text x="600" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#fff7ec">fact_orders</text>
    <text x="600" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#fff7ec">order_id, customer_key</text>
    <text x="600" y="378" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#fff7ec">product_key, date_key</text>
    <text x="600" y="411" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#fff7ec">quantity, revenue</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif" fill="#4b2a1d">
    <rect x="110" y="95" width="280" height="120" rx="18" fill="url(#dim)"/>
    <text x="250" y="140" text-anchor="middle" font-size="28" font-weight="700">dim_customer</text>
    <text x="250" y="175" text-anchor="middle" font-size="20">name, segment, region</text>

    <rect x="810" y="95" width="280" height="120" rx="18" fill="url(#dim)"/>
    <text x="950" y="140" text-anchor="middle" font-size="28" font-weight="700">dim_product</text>
    <text x="950" y="175" text-anchor="middle" font-size="20">category, brand, sku</text>

    <rect x="460" y="20" width="280" height="120" rx="18" fill="url(#dim)"/>
    <text x="600" y="65" text-anchor="middle" font-size="28" font-weight="700">dim_date</text>
    <text x="600" y="100" text-anchor="middle" font-size="20">day, month, quarter, year</text>

    <rect x="110" y="470" width="280" height="120" rx="18" fill="url(#dim)"/>
    <text x="250" y="515" text-anchor="middle" font-size="28" font-weight="700">dim_geography</text>
    <text x="250" y="550" text-anchor="middle" font-size="20">country, region, city</text>

    <rect x="810" y="470" width="280" height="120" rx="18" fill="url(#dim)"/>
    <text x="950" y="515" text-anchor="middle" font-size="28" font-weight="700">dim_channel</text>
    <text x="950" y="550" text-anchor="middle" font-size="20">web, mobile, retail, partner</text>
  </g>
</svg>
